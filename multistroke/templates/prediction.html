<!DOCTYPE html>
<html>
<head>
<title>Stroke Prediction</title>

<style>
body {
    margin:0;
    font-family:Segoe UI;
    background:url('https://images.unsplash.com/photo-1504814532849-cff240bbc503') no-repeat center/cover;
}

/* Layout */
.container {
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

/* Card */
.card {
    background:rgba(255,255,255,0.95);
    padding:30px;
    border-radius:15px;
    width:700px;
}

/* Form rows */
.form-row {
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:10px;
}

label {
    width:45%;
    font-weight:bold;
}

input, select {
    width:50%;
    padding:8px;
    border-radius:6px;
    border:1px solid #ccc;
}

/* Buttons */
button {
    padding:10px 15px;
    background:#4CAF50;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.back-btn {
    background:#555;
}

/* Result Box */
.result {
    margin-top:20px;
    padding:20px;
    border-radius:10px;
}

.high { background:#e53935; color:white; }
.medium { background:#ff9800; color:white; }
.low { background:#4CAF50; color:white; }

.result p {
    margin:5px 0;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h2 style="text-align:center;">🧠 Stroke Prediction</h2>

<!-- 🔙 BACK BUTTON -->
<div style="text-align:right; margin-bottom:10px;">
  <a href="/dashboard">
    <button class="back-btn">⬅ Back</button>
  </a>
</div>

<form method="POST">

<div class="form-row">
  <label>Age</label>
  <input name="age" required>
</div>

<div class="form-row">
  <label>Gender</label>
  <select name="gender">
    <option>Male</option>
    <option>Female</option>
  </select>
</div>

<div class="form-row">
  <label>Hypertension</label>
  <select name="hypertension">
    <option value="0">No</option>
    <option value="1">Yes</option>
  </select>
</div>

<div class="form-row">
  <label>Heart Disease</label>
  <select name="heart_disease">
    <option value="0">No</option>
    <option value="1">Yes</option>
  </select>
</div>

<div class="form-row">
  <label>Married</label>
  <select name="ever_married">
    <option>Yes</option>
    <option>No</option>
  </select>
</div>

<div class="form-row">
  <label>Work Type</label>
  <select name="work_type">
    <option>Private</option>
    <option>Self-employed</option>
    <option>Govt_job</option>
  </select>
</div>

<div class="form-row">
  <label>Residence</label>
  <select name="Residence_type">
    <option>Urban</option>
    <option>Rural</option>
  </select>
</div>

<div class="form-row">
  <label>Glucose Level</label>
  <input name="avg_glucose_level" required>
</div>

<div class="form-row">
  <label>BMI</label>
  <input name="bmi" required>
</div>

<div class="form-row">
  <label>Smoking Status</label>
  <select name="smoking_status">
    <option>never smoked</option>
    <option>formerly smoked</option>
    <option>smokes</option>
  </select>
</div>

<div style="text-align:center; margin-top:15px;">
  <button type="submit">Predict</button>
</div>

</form>

{% if result %}

<!-- 🔥 RESULT DISPLAY -->
<div class="result 
{% if result.prob > 0.7 %}high
{% elif result.prob > 0.4 %}medium
{% else %}low
{% endif %}">

<h3 style="text-align:center;">Result: {{ result.class }}</h3>

<hr>

<p><b>Probability:</b> {{ result.prob }}</p>
<p><b>Alert:</b> {{ result.alert }}</p>

<hr>

<p><b>Brain Stroke Score:</b> {{ result.brain }}</p>
<p><b>Heart Stroke Score:</b> {{ result.heart }}</p>

<div style="text-align:center; margin-top:10px;">
  <a href="/download_pdf">
    <button style="background:#2196F3;">Download Report</button>
  </a>
</div>

</div>

{% endif %}

</div>
</div>

</body>
</html>
